# 서버 포트
server.port=8080

# 로컬 전용 시크릿 파일 (git에 커밋되지 않음, 없어도 기동은 됨)
spring.config.import=optional:classpath:application-secret.properties

# 카카오 API 키 (환경변수로 주입 — 절대 커밋하지 말 것)
kakao.map.appkey=${KAKAO_MAP_APPKEY:}
kakao.map.restkey=${KAKAO_REST_API_KEY:}

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# H2 파일 기반 DB (재시작해도 유지)
spring.datasource.url=jdbc:h2:file:./data/wedding-db;NON_KEYWORDS=USER
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# 파일 업로드
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── 카카오 OAuth2 로그인 ──────────────────────────────────────
# 카카오 디벨로퍼(developers.kakao.com) > 내 애플리케이션 > REST API 키 (환경변수로 주입)
kakao.oauth.client-id=${KAKAO_REST_API_KEY:}
# 보안 메뉴에서 Client Secret 활성화한 경우 환경변수로 주입 (없으면 비워두세요)
kakao.oauth.client-secret=${KAKAO_CLIENT_SECRET:}

spring.security.oauth2.client.registration.kakao.client-id=${kakao.oauth.client-id}
spring.security.oauth2.client.registration.kakao.client-secret=${kakao.oauth.client-secret}
spring.security.oauth2.client.registration.kakao.redirect-uri={baseUrl}/login/oauth2/code/kakao
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.scope=profile_nickname
spring.security.oauth2.client.registration.kakao.client-name=카카오
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post

spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

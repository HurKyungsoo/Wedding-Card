# 카카오 디벨로퍼(developers.kakao.com) > 내 애플리케이션 > REST API 키
kakao.oauth.client-id=03a041000c72178b476cbb6e29431e81
# 보안 메뉴에서 Client Secret 활성화한 경우 아래 입력 (없으면 비워두세요)
kakao.oauth.client-secret=

spring.security.oauth2.client.registration.kakao.client-id=${kakao.oauth.client-id}
spring.security.oauth2.client.registration.kakao.client-secret=yXt75iaoqzoWWNCoFvNExpVIrSrneRrh
spring.security.oauth2.client.registration.kakao.redirect-uri={baseUrl}/login/oauth2/code/kakao
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and run tests
        run: mvn -B clean verify

      - name: Upload jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: weddingexam-jar
          path: target/*.jar
          retention-days: 7
